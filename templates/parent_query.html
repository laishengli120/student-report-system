<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学生素质教育报告册</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <style>
        :root { --paper-bg: #fdfbf7; }

        body { background-color: #f0f2f5; font-family: 'Noto Serif SC', serif; }

        .font-kaiti { font-family: "KaiTi", "STKaiti", "楷体", "Noto Serif SC", serif; }
        .font-calligraphy { font-family: 'Ma Shan Zheng', cursive; }

        .paper-doc {
            background-color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative;
        }
        .doc-border { border: 2px solid var(--paper-red); padding: 4px; border-radius: 4px; }
        .doc-inner-border { border: 1px solid var(--paper-red); padding: 16px; }

        .report-table { width: 100%; border-collapse: collapse; border: 2px solid var(--paper-red); margin-top: 10px; }
        .report-table th, .report-table td { border: 1px solid var(--paper-red); padding: 8px; text-align: center; }
        .report-table th { background-color: #fff5f5; color: var(--paper-red); font-weight: bold; font-size: 1.1em; }
        .report-table td { font-size: 1.1em; color: #333; }

        input.handwritten {
            border: none; border-bottom: 2px dashed #999; background: transparent;
            font-family: 'KaiTi', serif; font-size: 1.25rem; color: #333; text-align: center; outline: none;
        }
        input.handwritten:focus { border-bottom: 2px solid var(--paper-red); }

        #signature-pad {
            touch-action: none; cursor: crosshair; background: #fff;
            background-image: radial-gradient(#ddd 1px, transparent 1px); background-size: 10px 10px;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center py-6 px-2 sm:px-4">

    <!-- Search / Login Section (Initial View) -->
    <div id="query-section" class="w-full max-w-lg bg-white p-8 rounded-xl shadow-lg border-t-4 border-paper-red">
        <div class="text-center mb-8">
            <div class="inline-block border-2 border-paper-red rounded-full p-3 mb-4">
                <svg class="w-10 h-10 text-paper-red" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 font-kaiti">期末通知书查询</h1>
            <p class="text-gray-500 text-sm mt-2">请输入学生姓名查阅电子通知书</p>
        </div>

        <div id="error-box" class="hidden bg-red-50 text-red-700 p-3 rounded mb-4 text-sm border border-red-200"></div>

        <form id="query-form" class="space-y-6">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2 font-kaiti">学生姓名</label>
                <input type="text" id="student_name" 
                       class="w-full text-center text-xl py-3 border-b-2 border-gray-300 focus:border-paper-red outline-none bg-gray-50 rounded-t transition-colors font-kaiti placeholder-gray-400"
                       placeholder="请输入姓名 (如: 张小明)" required>
            </div>
            <button type="submit" id="submit-btn" 
                    class="w-full bg-paper-red text-white font-bold py-3 px-4 rounded shadow hover:bg-red-700 transition flex justify-center items-center">
                <span>查阅通知书</span>
                <div id="btn-spinner" class="spinner ml-2 hidden"></div>
            </button>
        </form>
    </div>

    <!-- Result Section (The Notification Letter) -->
    <div id="result-section" class="hidden w-full max-w-3xl mt-4 animate-fade-in-up">
        
        <div class="paper-doc doc-border bg-white text-gray-900">
            <div class="doc-inner-border">
                
                <!-- Header -->
                <div class="flex justify-between items-start mb-4 border-b border-paper-red pb-2">
                    <div class="flex-none text-center w-full">
                        <h1 class="text-4xl sm:text-5xl text-paper-red font-calligraphy tracking-widest mb-1">通知书</h1>
                    </div>
                </div>

                <!-- Intro Text -->
                <div class="text-base sm:text-lg leading-relaxed font-kaiti space-y-2 mb-4">
                    <div id="announcement-content">
                        <!-- Content injected via JS -->
                    </div>
                </div>

                <!-- Section 1: Grade Table -->
                <div class="mb-6">
                    <h3 class="text-lg font-bold text-paper-red mb-1 font-kaiti">一、学生平时在校表现及期末各科学业等级评价：</h3>
                    
                    <div class="overflow-hidden rounded-sm">
                        <table class="report-table">
                            <thead>
                                <tr>
                                    <th class="w-24">学科</th>
                                    <th class="w-20" id="score-header-label">等级</th>
                                    <th>班主任评语</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="bg-red-50 font-kaiti">语文</td>
                                    <td class="font-bold text-xl font-mono" id="score-chinese"></td>
                                    <td rowspan="5" class="text-left align-middle p-4">
                                        <p id="result-remarks" class="font-kaiti text-lg leading-relaxed text-gray-800 italic" style="text-indent:2em;">
                                            <!-- Remarks go here -->
                                        </p>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="bg-red-50 font-kaiti">数学</td>
                                    <td class="font-bold text-xl font-mono" id="score-math"></td>
                                </tr>
                                <tr>
                                    <td class="bg-red-50 font-kaiti">英语</td>
                                    <td class="font-bold text-xl font-mono" id="score-english"></td>
                                </tr>
                                <tr>
                                    <td class="bg-red-50 font-kaiti">科学</td>
                                    <td class="font-bold text-xl font-mono" id="score-science"></td>
                                </tr>
                                <tr>
                                    <td class="bg-red-50 font-kaiti">道法</td>
                                    <td class="font-bold text-xl font-mono" id="score-morality"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Section 2: Safety Notice (loaded dynamically from admin settings) -->
                <div id="safety-notice-content" class="mb-6">
                    <!-- Filled from API response -->
                </div>

                <!-- Signature Section -->
                <div class="mt-8 pt-4 border-t-2 border-dashed border-gray-300">
                    <div class="flex items-center mb-4">
                        <span class="bg-paper-red w-2 h-6 mr-2"></span>
                        <h3 class="font-bold text-lg text-gray-800 font-kaiti">家长回执 / 签名确认</h3>
                    </div>

                    <!-- Signed State -->
                    <div id="signed-display" class="hidden text-center p-4 bg-green-50 border border-green-200 rounded">
                        <p class="text-green-800 font-bold mb-2 font-kaiti text-lg">家长已阅知并确认</p>
                        <div class="inline-block p-2 bg-white rounded border border-green-100">
                            <img id="existing-signature-img" src="" alt="Signature" class="h-20 object-contain mix-blend-multiply">
                        </div>
                        <p class="text-sm text-gray-500 mt-2 font-mono">签署时间: <span id="signed-date"></span></p>
                    </div>

                    <!-- Unsigned State -->
                    <div id="unsigned-display" class="hidden">
                        <p class="text-gray-600 mb-2 text-sm font-kaiti">本人已认真阅读以上安全告知书，将切实履行监护责任。请在下方签字确认：</p>
                        <div class="border-2 border-gray-800 rounded relative bg-white" style="height: 180px;">
                            <canvas id="signature-pad" class="w-full h-full block"></canvas>
                            <div class="absolute bottom-1 right-2 text-xs text-gray-400 pointer-events-none font-kaiti">请在此区域书写</div>
                        </div>
                        <div class="flex gap-2 mt-3">
                            <button id="clear-sig-btn" class="flex-1 py-3 border border-gray-400 text-gray-600 rounded bg-white font-kaiti hover:bg-gray-50">重写</button>
                            <button id="submit-sig-btn" class="flex-1 py-3 bg-paper-red text-white rounded font-bold shadow hover:bg-red-700 font-kaiti text-lg">提交签名</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="mt-6 text-center">
            <button onclick="resetQuery()" class="text-gray-500 underline font-kaiti text-lg">查询其他同学</button>
        </div>
        <div class="h-12"></div>
    </div>

    <script>
        // --- Logic ---
        const querySection = document.getElementById('query-section');
        const resultSection = document.getElementById('result-section');
        const queryForm = document.getElementById('query-form');
        const nameInput = document.getElementById('student_name');
        const submitBtn = document.getElementById('submit-btn');
        const btnSpinner = document.getElementById('btn-spinner');
        const errorBox = document.getElementById('error-box');

        // Signature
        const canvas = document.getElementById('signature-pad');
        const clearBtn = document.getElementById('clear-sig-btn');
        const submitSigBtn = document.getElementById('submit-sig-btn');
        const signedDisplay = document.getElementById('signed-display');
        const unsignedDisplay = document.getElementById('unsigned-display');
        let signaturePadContext = null;
        let isDrawing = false;
        let currentStudentName = "";

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.remove('hidden');
            setTimeout(() => errorBox.classList.add('hidden'), 5000);
        }

        function resetQuery() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            resultSection.classList.add('hidden');
            querySection.classList.remove('hidden');
            nameInput.value = '';
            signedDisplay.classList.add('hidden');
            unsignedDisplay.classList.add('hidden');
            clearSignature();
        }

        // --- Canvas Logic ---
        function initSignaturePad() {
            signaturePadContext = canvas.getContext('2d');
            
            function resizeCanvas() {
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                signaturePadContext.scale(ratio, ratio);
                signaturePadContext.lineWidth = 3;
                signaturePadContext.lineCap = 'round';
                signaturePadContext.strokeStyle = '#000';
            }
            window.addEventListener('resize', resizeCanvas);
            // Delay initial resize to ensure element is visible/layout calc is correct
            setTimeout(resizeCanvas, 100); 

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
                const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            function start(e) {
                isDrawing = true;
                const pos = getPos(e);
                signaturePadContext.beginPath();
                signaturePadContext.moveTo(pos.x, pos.y);
                e.preventDefault(); // Prevent scroll on touch
            }
            function move(e) {
                if(!isDrawing) return;
                const pos = getPos(e);
                signaturePadContext.lineTo(pos.x, pos.y);
                signaturePadContext.stroke();
                e.preventDefault(); 
            }
            function end() {
                isDrawing = false;
            }

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            canvas.addEventListener('mouseup', end);
            canvas.addEventListener('touchstart', start, {passive: false});
            canvas.addEventListener('touchmove', move, {passive: false});
            canvas.addEventListener('touchend', end);
        }

        function clearSignature() {
            if(signaturePadContext) {
                // Use default canvas dims for clearing
                signaturePadContext.clearRect(0, 0, canvas.width, canvas.height); 
                signaturePadContext.beginPath();
            }
        }

        async function uploadSignature() {
            if (!currentStudentName) return;
            
            const dataURL = canvas.toDataURL("image/png");
            submitSigBtn.disabled = true;
            submitSigBtn.textContent = "提交中...";
            
            try {
                const response = await fetch('/api/submit_signature', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_name: currentStudentName,
                        signature_img: dataURL
                    })
                });
                
                if (response.ok) {
                    showSignedState(new Date().toLocaleString(), dataURL);
                } else {
                    alert('提交失败，请重试');
                }
            } catch (e) {
                alert('网络错误');
            } finally {
                submitSigBtn.disabled = false;
                submitSigBtn.textContent = "提交签名";
            }
        }

        function showSignedState(dateStr, imgUrl) {
            unsignedDisplay.classList.add('hidden');
            signedDisplay.classList.remove('hidden');
            document.getElementById('signed-date').textContent = dateStr;
            document.getElementById('existing-signature-img').src = imgUrl;
        }

        // --- Main Query Logic ---
        async function submitQuery(name) {
            if (!name) return;
            currentStudentName = name;
            
            submitBtn.disabled = true;
            btnSpinner.classList.remove('hidden');
            errorBox.classList.add('hidden');

            try {
                const response = await fetch(`/api/get_report?name=${encodeURIComponent(name)}`);
                const data = await response.json();

                if (response.ok) {
                    // Fill data
                    document.getElementById('announcement-content').innerHTML = data.announcement_html;

                    // Score display: adapt to score_display_mode
                    const displayMode = data.score_display_mode || 'grade_only';
                    const headerLabel = document.getElementById('score-header-label');
                    const subjects = ['chinese', 'math', 'english', 'science', 'morality'];
                    subjects.forEach(subj => {
                        const grade = data[subj + '_grade'] || '';
                        const score = data[subj + '_score'];
                        const scoreStr = (score !== null && score !== undefined && score !== '') ? score : '';
                        let displayText = '';
                        if (displayMode === 'grade_only') {
                            displayText = grade;
                        } else if (displayMode === 'score_only') {
                            displayText = scoreStr;
                        } else if (displayMode === 'both') {
                            displayText = (scoreStr && grade) ? `${scoreStr} (${grade})` : (grade || scoreStr);
                        }
                        document.getElementById('score-' + subj).textContent = displayText;
                    });
                    // Update header label
                    if (headerLabel) {
                        if (displayMode === 'grade_only') headerLabel.textContent = '等级';
                        else if (displayMode === 'score_only') headerLabel.textContent = '成绩';
                        else headerLabel.textContent = '成绩 / 等级';
                    }
                    
                    const remarks = data.final_remarks || "（暂无评语）";
                    document.getElementById('result-remarks').innerHTML = remarks.replace(/\n/g, '<br>');

                    // Fill safety notice content
                    const safetyDiv = document.getElementById('safety-notice-content');
                    if (safetyDiv && data.safety_notice_html) {
                        safetyDiv.innerHTML = data.safety_notice_html;
                    }

                    // Handle Signature UI
                    if (data.signed_at && data.signature_img) {
                        showSignedState(data.signed_at, data.signature_img);
                    } else {
                        signedDisplay.classList.add('hidden');
                        unsignedDisplay.classList.remove('hidden');
                        // Trigger resize for canvas because it was hidden
                        setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
                    }

                    querySection.classList.add('hidden');
                    resultSection.classList.remove('hidden');
                    
                    // Init pad if not already
                    if (!signaturePadContext) initSignaturePad();

                } else {
                    showError(data.error || '查无此人');
                }
            } catch (err) {
                showError('网络请求失败');
            } finally {
                submitBtn.disabled = false;
                btnSpinner.classList.add('hidden');
            }
        }

        queryForm.addEventListener('submit', (e) => {
            e.preventDefault();
            submitQuery(nameInput.value.trim());
        });

        clearBtn.addEventListener('click', clearSignature);
        submitSigBtn.addEventListener('click', uploadSignature);

    </script>
</body>
</html>
